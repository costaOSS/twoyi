name: Build APK

'on':
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-linux-android

      - name: Cache cargo-xdk
        id: cache-cargo-xdk
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-xdk
          key: ${{ runner.os }}-cargo-xdk

      - name: Install cargo-xdk
        if: steps.cache-cargo-xdk.outputs.cache-hit != 'true'
        run: cargo install cargo-xdk

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Decode keystore
        if: github.event.inputs.build_type == 'release'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ runner.temp }}/keystore.jks

      - name: Determine build type
        id: build-type
        run: |
          TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          echo "type=$TYPE" >> "$GITHUB_OUTPUT"
          echo "capitalized=${TYPE^}" >> "$GITHUB_OUTPUT"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew "assemble${{ steps.build-type.outputs.capitalized }}"
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}
          KEYSTORE_PATH: ${{ runner.temp }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: twoyi-${{ steps.build-type.outputs.type }}
          path: app/build/outputs/apk/${{ steps.build-type.outputs.type }}/*.apk
          retention-days: 30
